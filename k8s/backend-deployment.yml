apiVersion: apps/v1
kind: Deployment
metadata:
  name: student-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: student-backend
  template:
    metadata:
      labels:
        app: student-backend
    spec:
      containers:
        - name: student-backend
          image: student-record-pipeline-backend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: MONGO_URI
              value: "mongodb://student-mongo:27017/studentdb"
---
apiVersion: v1
kind: Service
metadata:
  name: student-backend
spec:
  type: NodePort
  selector:
    app: student-backend
  ports:
    - port: 3001
      targetPort: 3001
      nodePort: 30081