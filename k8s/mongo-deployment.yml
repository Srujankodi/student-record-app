apiVersion: apps/v1
kind: Deployment
metadata:
  name: student-mongo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: student-mongo
  template:
    metadata:
      labels:
        app: student-mongo
    spec:
      containers:
        - name: student-mongo
          image: mongo:5
          ports:
            - containerPort: 27017
---
apiVersion: v1
kind: Service
metadata:
  name: student-mongo
spec:
  selector:
    app: student-mongo
  ports:
    - port: 27017
      targetPort: 27017